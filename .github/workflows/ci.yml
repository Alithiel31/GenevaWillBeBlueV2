name: CI Resistance Portal

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run Vitest
        run: npm run test

      - name: 🏗️ Check SvelteKit Build
        run: npm run build
        env:
          DATABASE_URL: "postgres://user:pass@localhost:5432/db" 